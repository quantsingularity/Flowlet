name: Terraform CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - infrastructure/terraform/**
  pull_request:
    branches:
      - main
      - develop
    paths:
      - infrastructure/terraform/**

jobs:
  terraform-validate-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1"

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: infrastructure/terraform

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check
        working-directory: infrastructure/terraform
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate
        working-directory: infrastructure/terraform

      - name: Run tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          tflint --init
          tflint infrastructure/terraform
        continue-on-error: true

      - name: Run Checkov
        run: |
          pip install checkov
          checkov -d infrastructure/terraform --quiet
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        working-directory: infrastructure/terraform
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Check Terraform plan results
        if: steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure'
        run: |
          echo "Terraform validation failed. Please check the infrastructure code."
          exit 1

      - name: Update Pull Request
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fmt = '${{ steps.fmt.outcome }}' === 'success' ? '✅' : '❌';
            const validate = '${{ steps.validate.outcome }}' === 'success' ? '✅' : '❌';
            const plan = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';
            const output = [
              '#### Terraform Format and Validate ⚙️',
              `${fmt} Format | ${validate} Validate`,
              '',
              '#### Terraform Plan 📖',
              '<details><summary>Show Plan</summary>',
              '',
              '```terraform',
              `${{ steps.plan.outputs.stdout }}`,
              '```',
              '',
              '</details>',
              '',
              `*Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
