apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgresql-backup
  namespace: flowlet-data
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: backup-sa
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            fsGroup: 999
          containers:
            - name: pg-backup
              image: postgres:15-alpine
              command:
                - /bin/sh
                - -c
                - |
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  pg_dump -h postgresql.flowlet-data.svc.cluster.local \
                    -U $PGUSER \
                    -d $PGDATABASE \
                    -F c \
                    -f /tmp/backup_${TIMESTAMP}.dump
                  echo "Backup completed: backup_${TIMESTAMP}.dump"
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: password
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: username
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: database
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-cache-cleanup
  namespace: flowlet-data
spec:
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
          containers:
            - name: redis-cleanup
              image: redis:7-alpine
              command:
                - /bin/sh
                - -c
                - |
                  redis-cli -h redis.flowlet-data.svc.cluster.local \
                    -a $REDIS_PASSWORD \
                    --scan --pattern "session:*" | \
                  xargs -r redis-cli -h redis.flowlet-data.svc.cluster.local \
                    -a $REDIS_PASSWORD del
                  echo "Cache cleanup complete"
              env:
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: redis-credentials
                      key: password
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-sa
  namespace: flowlet-data
