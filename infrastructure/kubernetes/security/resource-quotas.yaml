---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: flowlet-core-quota
  namespace: flowlet-core
spec:
  hard:
    pods: "50"
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
    services: "20"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: flowlet-core-limits
  namespace: flowlet-core
spec:
  limits:
    - default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 250m
        memory: 256Mi
      type: Container
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: flowlet-data-quota
  namespace: flowlet-data
spec:
  hard:
    pods: "20"
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    persistentvolumeclaims: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: flowlet-data-limits
  namespace: flowlet-data
spec:
  limits:
    - default:
        cpu: 1000m
        memory: 1Gi
      defaultRequest:
        cpu: 250m
        memory: 256Mi
      type: Container
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: flowlet-monitoring-quota
  namespace: flowlet-monitoring
spec:
  hard:
    pods: "20"
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
