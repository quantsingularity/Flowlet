apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: flowlet-core
data:
  application.yml: |
    server:
      port: 8080
    services:
      wallet:
        url: http://wallet-service.flowlet-core.svc.cluster.local
      payments:
        url: http://payments-service.flowlet-core.svc.cluster.local
      cards:
        url: http://card-service.flowlet-core.svc.cluster.local
      kyc:
        url: http://kyc-aml-service.flowlet-core.svc.cluster.local
      ledger:
        url: http://ledger-service.flowlet-core.svc.cluster.local
      auth:
        url: http://auth-service.flowlet-core.svc.cluster.local
      notifications:
        url: http://notification-service.flowlet-core.svc.cluster.local
    redis:
      host: redis.flowlet-data.svc.cluster.local
      port: 6379
    cors:
      allowedOrigins: "${CORS_ORIGINS:*}"
      allowedMethods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
      allowedHeaders: "*"
    rateLimit:
      requests: 1000
      window: 60000
    logging:
      level: info
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: flowlet-core
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: flowlet-services
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: api-gateway
          image: flowlet/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: "production"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: password
            - name: PORT
              value: "8080"
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: tmp-vol
              mountPath: /tmp
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: api-gateway-config
        - name: tmp-vol
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: flowlet-core
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: LoadBalancer
