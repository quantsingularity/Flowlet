global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.example.com:587"
  smtp_from: "alertmanager@flowlet.com"
  smtp_auth_username: "${SMTP_USERNAME}"
  smtp_auth_password: "${SMTP_PASSWORD}"

route:
  group_by: ["alertname", "job", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "default-receiver"
  routes:
    - match:
        severity: critical
      receiver: "critical-receiver"
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: "warning-receiver"
      repeat_interval: 6h

receivers:
  - name: "default-receiver"
    webhook_configs:
      - url: "http://localhost:5001/webhook"
        send_resolved: true

  - name: "critical-receiver"
    webhook_configs:
      - url: "http://localhost:5001/webhook"
        send_resolved: true

  - name: "warning-receiver"
    webhook_configs:
      - url: "http://localhost:5001/webhook"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
