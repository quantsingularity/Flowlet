---
- name: Docker configuration and setup
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
      tags: [docker]

    - name: Configure Docker daemon
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            },
            "storage-driver": "overlay2",
            "live-restore": true,
            "userland-proxy": false
          }
        mode: "0644"
        owner: root
        group: root
      notify: Restart Docker
      tags: [docker]

    - name: Ensure Docker service is enabled and started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
      tags: [docker]

  handlers:
    - name: Restart Docker
      ansible.builtin.service:
        name: docker
        state: restarted
